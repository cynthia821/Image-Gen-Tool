<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>T&F · Image Workflow</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #141414;
  --surface:   #1c1c1c;
  --surface2:  #212121;
  --hover:     #282828;
  --border:    #2e2e2e;
  --border2:   #252525;
  --text:      #e2e2e2;
  --text2:     #a0a0a0;
  --text3:     #858585;
  --accent:    #5e6ad2;
  /* Category colors — all verified ≥4.5:1 on their respective dark backgrounds */
  --c-mkt-bg: #162413; --c-mkt: #6ebe60;
  --c-des-bg: #111d2c; --c-des: #5cb8f0;
  --c-dev-bg: #1a1130; --c-dev: #b08ae0;
  --c-str-bg: #251a07; --c-str: #dba050;
  --mono: 'JetBrains Mono','Fira Code','Courier New',monospace;
}

body {
  font-family: 'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
  background: var(--bg); color: var(--text);
  height: 100vh; display: flex; flex-direction: column;
  overflow: hidden; font-size: 13px;
  -webkit-font-smoothing: antialiased;
}

/* ── HEADER ── */
header {
  flex-shrink: 0; min-height: 52px;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  padding: 0 16px;
  display: flex; align-items: center; gap: 10px;
  z-index: 20;
  position: relative;
}
.hdr-sep { color: var(--border); font-size: 15px; }
.hdr-sub { font-size: 12px; color: var(--text3); }
header .spacer { flex: 1; }
.progress-pill {
  font-size: 10px; color: var(--text3);
  font-family: var(--mono);
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 4px; padding: 2px 8px;
}
.hdr-btn {
  font-size: 11px; color: var(--text2);
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 4px; padding: 8px 12px;
  cursor: pointer; font-family: inherit; font-weight: 500;
  display: inline-flex; align-items: center; gap: 5px;
  transition: background 0.08s, color 0.08s;
  white-space: nowrap;
}
.hdr-btn:hover { background: var(--hover); color: var(--text); border-color: var(--text3); }

/* ── STYLE POPOVER ── */
.style-popover {
  position: absolute; top: 56px; right: 16px;
  width: 560px; background: var(--surface);
  border: 1px solid var(--border); border-radius: 6px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.5);
  z-index: 30; display: none; flex-direction: column;
}
.style-popover.open { display: flex; }
.sp-head {
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 8px;
}
.sp-title { font-size: 11px; font-weight: 600; color: var(--text2); flex: 1; text-transform: uppercase; letter-spacing: 0.06em; }
.sp-close {
  background: none; border: none; cursor: pointer;
  color: var(--text3); font-size: 14px; padding: 1px 4px; border-radius: 3px; line-height: 1;
}
.sp-close:hover { color: var(--text); background: var(--hover); }
.sp-body { padding: 12px 14px; display: flex; flex-direction: column; gap: 10px; }
.sp-row  { display: flex; gap: 10px; }
.sp-col  { display: flex; flex-direction: column; gap: 4px; flex: 1; }
.sp-col label { font-size: 10px; color: var(--text3); font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em; }
.sp-col textarea, .sp-col input {
  background: var(--bg); border: 1px solid var(--border); border-radius: 4px;
  color: var(--text2); font-size: 11px; font-family: var(--mono);
  padding: 8px 12px; outline: none; resize: vertical; line-height: 1.5;
}
.sp-col textarea:focus, .sp-col input:focus { border-color: var(--accent); color: var(--text); }
#styleDesc { min-height: 60px; }

/* Style reference image upload */
.style-ref-zone {
  border: 1px dashed var(--border); border-radius: 4px;
  background: var(--bg); min-height: 80px;
  padding: 8px; cursor: pointer;
  display: flex; flex-direction: column; gap: 8px;
  transition: border-color 0.12s, background 0.12s;
}
.style-ref-zone:hover { border-color: var(--text3); }
.style-ref-zone.drag-over { border-color: var(--accent); background: rgba(94,106,210,0.06); }
.style-ref-placeholder {
  flex: 1; display: flex; align-items: center; justify-content: center;
  font-size: 11px; color: var(--text3); text-align: center;
  padding: 12px 8px; pointer-events: none; line-height: 1.6;
  user-select: none;
}
.style-ref-thumbs { display: flex; flex-wrap: wrap; gap: 8px; }
.style-ref-thumb {
  position: relative; width: 60px; height: 60px; flex-shrink: 0;
}
.style-ref-thumb img {
  width: 100%; height: 100%; object-fit: cover; display: block;
  border-radius: 3px; border: 1px solid var(--border);
}
.style-ref-del {
  position: absolute; top: -5px; right: -5px;
  width: 16px; height: 16px; border-radius: 50%;
  background: var(--surface2); color: var(--text2);
  border: 1px solid var(--border); cursor: pointer;
  font-size: 8px; line-height: 1;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.08s, color 0.08s;
  z-index: 2;
}
.style-ref-del:hover { background: #3a1010; color: #f08080; border-color: #6a2020; }

/* Aspect ratio select */
.sp-select {
  width: 100%; background: var(--bg); border: 1px solid var(--border);
  border-radius: 4px; color: var(--text2); font-size: 11px;
  font-family: inherit; padding: 8px 12px; outline: none; cursor: pointer;
}
.sp-select:focus { border-color: var(--accent); color: var(--text); }

/* ── GALLERY MODAL ── */
.gallery-modal {
  position: fixed; inset: 0; z-index: 50;
  background: rgba(0,0,0,0.82); backdrop-filter: blur(4px);
  display: none; flex-direction: column;
}
.gallery-modal.open { display: flex; }
.gallery-top {
  height: 48px; flex-shrink: 0;
  display: flex; align-items: center; gap: 10px;
  padding: 0 20px;
  background: var(--surface); border-bottom: 1px solid var(--border);
}
.gallery-title { font-size: 13px; font-weight: 600; flex: 1; }
.gallery-scroll { flex: 1; overflow-y: auto; padding: 20px; }
.gallery-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 14px;
}
.gal-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 6px; overflow: hidden;
  display: flex; flex-direction: column;
  cursor: pointer; transition: border-color 0.1s;
}
.gal-card:hover { border-color: var(--text3); }
.gal-img { position: relative; background: #0a0a09; line-height: 0; aspect-ratio: 16/9; overflow: hidden; }
.gal-img img { width: 100%; height: 100%; object-fit: cover; display: block; }
.gal-empty {
  width: 100%; height: 100%;
  display: flex; align-items: center; justify-content: center;
  color: var(--text3); font-size: 11px; aspect-ratio: 16/9;
}
.gal-info {
  padding: 8px 10px;
  display: flex; align-items: center; gap: 7px;
}
.gal-name { font-size: 11px; color: var(--text2); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.gal-dl {
  font-size: 10px; padding: 8px 12px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 3px; cursor: pointer; color: var(--text3);
  font-family: inherit; white-space: nowrap;
  transition: background 0.08s;
}
.gal-dl:hover { background: var(--hover); color: var(--text2); }
.gal-dl:disabled { opacity: 0.25; cursor: default; }


/* ── LAYOUT ── */
.layout { display: flex; flex: 1; overflow: hidden; }

/* ── SIDEBAR ── */
.sidebar {
  width: 320px; flex-shrink: 0;
  background: var(--bg);
  border-right: 1px solid var(--border);
  overflow-y: auto; display: flex; flex-direction: column;
  scrollbar-gutter: stable;
}
.sb-search {
  padding: 8px 8px 4px;
  position: sticky; top: 0; background: var(--bg); z-index: 2;
}
.sb-search input {
  width: 100%; padding: 8px 12px;
  border: 1px solid var(--border); border-radius: 4px;
  font-size: 12px; font-family: inherit;
  background: var(--surface); color: var(--text); outline: none;
}
.sb-search input::placeholder { color: var(--text3); }
.sb-search input:focus { border-color: var(--accent); }

.cat-block { padding-top: 4px; padding-bottom: 4px; border-bottom: 1px solid var(--border2); }
.cat-block:last-child { border-bottom: none; }
.cat-hdr {
  padding: 8px 12px;
  font-size: 10px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.07em;
  color: var(--text3);
  display: flex; align-items: center; gap: 5px;
  user-select: none; cursor: pointer;
  transition: color 0.07s;
}
.cat-hdr:hover { color: var(--text2); }
.cat-hdr-label { flex: 1; }
.cat-n { font-weight: 400; text-transform: none; letter-spacing: 0; }
.cat-chevron {
  font-size: 7px; line-height: 1; color: var(--text3);
  transition: transform 0.18s ease;
  display: inline-block;
}
.cat-block.collapsed .cat-chevron { transform: rotate(-90deg); }
.cat-items { overflow: hidden; }
.cat-block.collapsed .cat-items { display: none; }
.svc-item {
  padding: 8px 10px 8px 14px;
  margin: 0 4px;
  font-size: 12px; cursor: pointer; color: var(--text2);
  border-radius: 4px; line-height: 1.45;
  display: flex; align-items: center; gap: 6px;
  transition: background 0.07s, color 0.07s;
}
.svc-item:hover  { background: var(--surface); color: var(--text); }
.svc-item.active { background: var(--surface2); color: var(--text); font-weight: 500; }

/* ── MAIN ── */
.main { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
.card-wrap {
  max-width: 860px; width: 100%; margin: 0 auto;
  padding: 20px 40px;
  flex: 1; display: flex; flex-direction: column;
  overflow: hidden; min-height: 0;
}
#serviceCard {
  flex: 1; display: flex; flex-direction: column; min-height: 0;
}

/* ── SERVICE CARD ── */
.svc-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 6px; overflow: hidden;
  flex: 1; display: flex; flex-direction: column;
}

/* Card head — lives outside .svc-card */
.card-head { padding: 16px 20px 14px; }
.card-meta { display: flex; align-items: center; gap: 7px; margin-bottom: 9px; }
.cat-tag {
  font-size: 10px; font-weight: 600; letter-spacing: 0.04em;
  text-transform: uppercase; padding: 2px 8px; border-radius: 3px;
}
.cat-tag.marketing   { background: var(--c-mkt-bg); color: var(--c-mkt); }
.cat-tag.design      { background: var(--c-des-bg); color: var(--c-des); }
.cat-tag.development { background: var(--c-dev-bg); color: var(--c-dev); }
.cat-tag.strategy    { background: var(--c-str-bg); color: var(--c-str); }
.svc-type  { font-size: 11px; color: var(--text3); }
.card-pos  { margin-left: auto; font-size: 10px; color: var(--text3); font-family: var(--mono); }
.card-name { font-size: 17px; font-weight: 600; color: var(--text); margin-bottom: 6px; line-height: 1.3; }
.card-def  { font-size: 12px; color: var(--text2); line-height: 1.6; }
.card-chips { display: flex; gap: 6px; margin-top: 10px; }
.chip {
  font-size: 10px; padding: 2px 9px; border-radius: 3px;
  border: 1px solid var(--border); color: var(--text2);
  font-weight: 500; background: var(--surface2);
}

/* ── CARD BODY — two-column layout ── */
.card-body { display: flex; border-bottom: 1px solid var(--border2); min-height: 0; flex: 1; }
.card-img-col {
  flex: 0 0 340px;
  border-right: 1px solid var(--border2);
  display: flex; flex-direction: column;
}
.card-ctrl-col {
  flex: 1; min-width: 0;
  display: flex; flex-direction: column;
  overflow-y: auto;
  scrollbar-gutter: stable;
}

/* Section header row */
.sec-hdr {
  padding: 8px 18px;
  display: flex; align-items: center; gap: 8px;
  border-bottom: 1px solid var(--border2);
}
.sec-label {
  font-size: 10px; font-weight: 600; letter-spacing: 0.06em;
  text-transform: uppercase; color: var(--text3); flex: 1;
}
.sec-actions { display: flex; gap: 5px; align-items: center; }
.provider-tag { font-size: 10px; color: var(--text3); }

/* ── BUTTONS ── */
.btn {
  font-size: 11px; padding: 8px 12px;
  border-radius: 4px; border: 1px solid var(--border);
  cursor: pointer; background: var(--surface2); color: var(--text2);
  font-family: inherit; font-weight: 500;
  display: inline-flex; align-items: center; gap: 5px;
  transition: background 0.08s, color 0.08s, border-color 0.08s;
  white-space: nowrap;
}
.btn:hover { background: var(--hover); color: var(--text); border-color: var(--text3); }
.btn:disabled { opacity: 0.3; cursor: not-allowed; }
.btn.accent { background: var(--accent); color: #fff; border-color: var(--accent); }
.btn.accent:hover { opacity: 0.88; }
.btn.green { background: var(--c-mkt-bg); color: var(--c-mkt); border-color: #1e3518; }
/* Icon-only button — square padding, slightly larger glyph */
.btn-icon { padding: 6px 8px; font-size: 14px; line-height: 1; }

/* spinner */
@keyframes spin { to { transform: rotate(360deg); } }
.spin {
  width: 10px; height: 10px; border-radius: 50%;
  border: 1.5px solid rgba(226,226,226,0.2);
  border-top-color: var(--text2);
  animation: spin 0.75s linear infinite;
  display: inline-block; flex-shrink: 0;
}

/* Image area — inside .card-img-col */
.img-area { flex: 1; display: flex; flex-direction: column; }
.img-body  { background: var(--bg); flex: 1; display: flex; flex-direction: column; justify-content: center; }

.img-empty, .img-noapikey {
  padding: 24px 16px; text-align: center;
  color: var(--text3); font-size: 11px; line-height: 1.7;
}
.img-noapikey strong { color: var(--text2); }

.img-gen-state {
  padding: 32px 16px; text-align: center;
  display: flex; flex-direction: column; align-items: center; gap: 10px;
}
.big-spin {
  width: 22px; height: 22px; border-radius: 50%;
  border: 2px solid var(--border);
  border-top-color: var(--text2);
  animation: spin 0.9s linear infinite;
}
.gen-txt { font-size: 12px; color: var(--text2); }
.gen-sub { font-size: 11px; color: var(--text3); }

.img-result { position: relative; background: #0a0a09; line-height: 0; }
.img-result img { width: 100%; height: auto; display: block; }
.img-btns { position: absolute; top: 8px; right: 8px; display: flex; gap: 5px; }
.ib {
  font-size: 11px; padding: 8px 12px; border-radius: 3px;
  border: none; cursor: pointer; font-weight: 500;
  backdrop-filter: blur(8px); font-family: inherit;
  transition: opacity 0.1s;
}
.ib:hover { opacity: 0.85; }
.ib.dl    { background: rgba(226,226,226,0.9); color: #141414; }
.ib.del   { background: rgba(90,15,15,0.88); color: #f0a0a0; }

.img-error {
  padding: 10px 14px; background: #180808;
  border-top: 1px solid #3a1010;
  color: #e07070; font-size: 11px; line-height: 1.6;
}
.img-error a { color: inherit; opacity: 0.65; }

.upload-link { font-size: 10px; color: var(--text3); text-align: center; padding: 6px; border-top: 1px solid var(--border2); }
.upload-link label { color: var(--text2); cursor: pointer; text-decoration: underline; text-underline-offset: 2px; }
.upload-link input { display: none; }

/* Prompt section — inside .card-ctrl-col */
.prompt-sec { padding: 12px 16px 12px; border-bottom: 1px solid var(--border2); }
.prompt-hdr { display: flex; align-items: center; gap: 7px; margin-bottom: 8px; }
.prompt-hdr .sec-label { flex: 1; }

.prompt-ta {
  width: 100%; min-height: 140px;
  padding: 8px 10px; border: 1px solid var(--border); border-radius: 4px;
  font-size: 11px; font-family: var(--mono);
  background: var(--bg); color: var(--text2);
  resize: vertical; outline: none; line-height: 1.6;
}
.prompt-ta:focus { border-color: var(--accent); color: var(--text); }

.preview-lbl-row {
  display: flex; align-items: center; gap: 6px; margin: 10px 0 4px;
}
.preview-lbl {
  font-size: 10px; color: var(--text3); font-weight: 600;
  letter-spacing: 0.06em; text-transform: uppercase; flex: 1;
}
.preview-box {
  width: 100%; min-height: 140px;
  padding: 8px 10px; background: var(--bg); border: 1px solid var(--border);
  border-radius: 4px; font-size: 11px; font-family: var(--mono);
  color: var(--text2); line-height: 1.6; resize: vertical; outline: none;
}
.preview-box:focus { border-color: var(--accent); color: var(--text); }

/* Page footer — sticky to bottom of viewport as sibling of .layout */
.page-footer {
  flex-shrink: 0;
  background: var(--bg);
  border-top: 1px solid var(--border);
  padding: 0 40px;
  display: flex; justify-content: space-between; align-items: center;
  min-height: 50px;
  z-index: 10;
}
.nav-b {
  font-size: 11px; color: var(--text3); background: none; border: 1px solid transparent;
  cursor: pointer; padding: 8px 12px; border-radius: 4px; font-family: inherit;
  max-width: 260px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  transition: background 0.07s, color 0.07s, border-color 0.07s;
}
.nav-b:hover { background: var(--hover); color: var(--text2); border-color: var(--border); }
.nav-b:disabled { opacity: 0.2; cursor: default; }

/* ── LIGHTBOX ── */
.lightbox {
  position: fixed; inset: 0; z-index: 60;
  display: none; flex-direction: column;
  background: rgba(0,0,0,0.96);
}
.lightbox.open { display: flex; }
.lb-top {
  height: 48px; flex-shrink: 0;
  display: flex; align-items: center; gap: 10px;
  padding: 0 16px;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}
.lb-info { flex: 1; display: flex; align-items: center; gap: 8px; }
.lb-name { font-size: 13px; font-weight: 600; color: var(--text); }
.lb-of   { font-size: 11px; color: var(--text3); font-family: var(--mono); }
.lb-img-wrap {
  flex: 1; min-height: 0;
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
}
.lb-img-wrap img {
  max-width: 100%; max-height: 100%;
  object-fit: contain; border-radius: 4px;
  box-shadow: 0 8px 48px rgba(0,0,0,0.8);
  cursor: default;
}
.lb-nav-btn {
  width: 34px; height: 34px; border-radius: 4px;
  background: var(--surface); border: 1px solid var(--border);
  color: var(--text2); cursor: pointer; font-size: 16px; line-height: 1;
  display: inline-flex; align-items: center; justify-content: center;
  transition: background 0.08s, color 0.08s;
}
.lb-nav-btn:hover { background: var(--hover); color: var(--text); }
.lb-nav-btn:disabled { opacity: 0.25; cursor: default; }
.lb-dl-btn {
  font-size: 11px; padding: 8px 12px; border-radius: 4px;
  background: var(--surface); border: 1px solid var(--border);
  color: var(--text2); cursor: pointer; font-family: inherit; font-weight: 500;
  transition: background 0.08s, color 0.08s;
}
.lb-dl-btn:hover { background: var(--hover); color: var(--text); }
.lb-close-btn {
  width: 34px; height: 34px; border-radius: 4px;
  background: none; border: 1px solid var(--border);
  color: var(--text3); cursor: pointer; font-size: 15px; line-height: 1;
  display: inline-flex; align-items: center; justify-content: center;
  transition: background 0.08s, color 0.08s;
  margin-left: 4px;
}
.lb-close-btn:hover { background: var(--hover); color: var(--text); }

/* per-card style override */
.card-style-override { padding: 0 16px 12px; }
.cso-toggle {
  font-size: 10px; color: var(--text3); background: none; border: none;
  cursor: pointer; font-family: inherit; padding: 0;
  text-decoration: underline; text-underline-offset: 2px;
}
.cso-toggle:hover { color: var(--text2); }
.cso-body { margin-top: 8px; display: none; }
.cso-body.open { display: block; }
.cso-body textarea {
  width: 100%; min-height: 52px;
  padding: 8px 12px; border: 1px solid var(--border); border-radius: 4px;
  font-size: 11px; font-family: var(--mono);
  background: var(--bg); color: var(--text2);
  resize: vertical; outline: none; line-height: 1.5;
}
.cso-body textarea:focus { border-color: var(--accent); color: var(--text); }
.cso-lbl { font-size: 10px; color: var(--text3); margin-bottom: 4px; }

/* scrollbar */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text3); }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <svg width="24" height="24" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" style="flex-shrink:0">
    <defs>
      <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%"   stop-color="#f472b6"/>
        <stop offset="100%" stop-color="#7c3aed"/>
      </linearGradient>
    </defs>
    <circle cx="12" cy="12" r="11" fill="url(#logoGrad)"/>
  </svg>
  <span class="hdr-sep">/</span>
  <span class="hdr-sub">Image Workflow</span>
  <div class="spacer"></div>
  <span class="progress-pill" id="progressPill">0 / 57 generated</span>

// ─── STATE ──────────────────────────────────────────────────────────────────
let currentId = 1;
let filtered  = [...SERVICES];
let autoGenTimer = null;

// ─── STORAGE HELPERS ────────────────────────────────────────────────────────
const imgKey  = id => `tf_img_${id}`;
const getImg  = id => { try { return localStorage.getItem(imgKey(id)); } catch(e){ return null; } };
const saveImg = (id, v) => { try { localStorage.setItem(imgKey(id), v); } catch(e){ console.warn('Storage full'); } };
const delImg  = id => { try { localStorage.removeItem(imgKey(id)); } catch(e){}; };

// ─── WORKER CONFIG ────────────────────────────────────────────────────────────
// Set this to your Cloudflare Worker URL after deploying
const WORKER_URL = 'https://image-gen-tool.cynthia-129.workers.dev';

// ─── INIT ────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  renderSidebar(SERVICES);
  selectService(1);
  updateProgress();
});

// ─── STYLE POPOVER ───────────────────────────────────────────────────────────
function toggleStylePopover() {
  const pop = document.getElementById('stylePopover');
  pop.classList.toggle('open');
  if (pop.classList.contains('open')) renderStyleRefs();
}

// ─── STYLE REFERENCE IMAGES ──────────────────────────────────────────────────
function loadStyleRefs() {
  try { return JSON.parse(localStorage.getItem('tf_style_refs') || '[]'); }
  catch { return []; }
}
function saveStyleRefs(arr) { localStorage.setItem('tf_style_refs', JSON.stringify(arr)); }

function renderStyleRefs() {
  const thumbs = document.getElementById('styleRefThumbs');
  const placeholder = document.getElementById('styleRefPlaceholder');
  if (!thumbs) return;
  const refs = loadStyleRefs();
  thumbs.innerHTML = refs.map((src, i) => `
    <div class="style-ref-thumb">
      <img src="${src}" alt="Ref ${i+1}">
      <button class="style-ref-del" onclick="removeStyleRefImage(${i})" title="Remove">✕</button>
    </div>`).join('');
  if (placeholder) placeholder.style.display = refs.length ? 'none' : '';
}

function addStyleRefImages(files) {
  const refs = loadStyleRefs();
  const imgs = Array.from(files).filter(f => f.type.startsWith('image/'));
  if (!imgs.length) return;
  let pending = imgs.length;
  imgs.forEach(file => {
    const reader = new FileReader();
    reader.onload = e => {
      refs.push(e.target.result);
      pending--;
      if (pending === 0) { saveStyleRefs(refs); renderStyleRefs(); }
    };
    reader.readAsDataURL(file);
  });
}

function removeStyleRefImage(idx) {
  const refs = loadStyleRefs();
  refs.splice(idx, 1);
  saveStyleRefs(refs);
  renderStyleRefs();
}

function styleRefZoneClick(e) {
  if (e.target.closest('.style-ref-del')) return; // let X buttons handle themselves
  document.getElementById('styleRefInput')?.click();
}

function styleRefDragOver(e) {
  e.preventDefault();
  e.stopPropagation();
  document.getElementById('styleRefZone')?.classList.add('drag-over');
}

function styleRefDragLeave(e) {
  // Only remove if leaving the zone itself (not a child)
  if (!e.currentTarget.contains(e.relatedTarget)) {
    document.getElementById('styleRefZone')?.classList.remove('drag-over');
  }
}

function styleRefDrop(e) {
  e.preventDefault();
  e.stopPropagation();
  document.getElementById('styleRefZone')?.classList.remove('drag-over');
  addStyleRefImages(e.dataTransfer.files);
}
// Close popover when clicking outside
document.addEventListener('click', e => {
  const pop = document.getElementById('stylePopover');
  if (!pop?.classList.contains('open')) return;
  if (!pop.contains(e.target) && !e.target.closest('[onclick*="toggleStylePopover"]')) {
    pop.classList.remove('open');
  }
});

// ─── GALLERY ─────────────────────────────────────────────────────────────────
function openGallery() {
  renderGallery();
  document.getElementById('galleryModal').classList.add('open');
}

function closeGallery() {
  document.getElementById('galleryModal').classList.remove('open');
}

function renderGallery() {
  const grid = document.getElementById('galleryGrid');
  if (!grid) return;
  grid.innerHTML = SERVICES.map(s => {
    const img = getImg(s.id);
    const fname = s.name.replace(/[^a-z0-9]/gi, '-').toLowerCase();
    const catClass = s.cat.toLowerCase();
    return `
      <div class="gal-card" onclick="${img ? `openLightbox(${s.id})` : ''}">
        <div class="gal-img">
          ${img
            ? `<img src="${img}" alt="${s.name}">`
            : `<div class="gal-empty">No image yet</div>`}
        </div>
        <div class="gal-info">
          <span class="gal-name" title="${s.name}">
            <span class="cat-tag ${catClass}" style="font-size:9px;padding:1px 5px;margin-right:5px">${s.cat}</span>${s.name}
          </span>
          <button class="gal-dl" ${!img ? 'disabled' : ''} onclick="event.stopPropagation();galDownload('${fname}',${s.id})">↓</button>
        </div>
      </div>`;
  }).join('');
}

function triggerDownload(dataUrl, fname) {
  const ext = dataUrl.startsWith('data:image/webp') ? 'webp' : dataUrl.startsWith('data:image/jpeg') ? 'jpg' : 'png';
  fetch(dataUrl)
    .then(r => r.blob())
    .then(blob => {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = fname + '.' + ext;
      document.body.appendChild(a); a.click();
      document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(url), 1000);
    });
}

function galDownload(fname, id) {
  const img = getImg(id);
  if (!img) return;
  triggerDownload(img, fname);
}

// ─── LIGHTBOX ─────────────────────────────────────────────────────────────────
let lbCurrentId = null;
// IDs of services that have generated images (for lightbox prev/next)
function lbGeneratedIds() { return SERVICES.filter(s => getImg(s.id)).map(s => s.id); }

function openLightbox(id) {
  lbCurrentId = id;
  renderLightbox();
  document.getElementById('lightbox').classList.add('open');
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  lbCurrentId = null;
}

function renderLightbox() {
  if (!lbCurrentId) return;
  const s = SERVICES.find(x => x.id === lbCurrentId);
  const img = getImg(lbCurrentId);
  const ids = lbGeneratedIds();
  const idx = ids.indexOf(lbCurrentId);

  document.getElementById('lbImg').src  = img || '';
  document.getElementById('lbImg').alt  = s?.name || '';
  document.getElementById('lbName').textContent = s?.name || '';
  document.getElementById('lbOf').textContent   = `${idx+1} / ${ids.length}`;
  document.getElementById('lbPrevBtn').disabled = idx <= 0;
  document.getElementById('lbNextBtn').disabled = idx >= ids.length - 1;
}

function lbNav(dir) {
  const ids = lbGeneratedIds();
  const idx = ids.indexOf(lbCurrentId);
  const next = idx + dir;
  if (next < 0 || next >= ids.length) return;
  lbCurrentId = ids[next];
  renderLightbox();
}

function lbDownload() {
  if (!lbCurrentId) return;
  const s = SERVICES.find(x => x.id === lbCurrentId);
  const img = getImg(lbCurrentId);
  if (!img || !s) return;
  const fname = s.name.replace(/[^a-z0-9]/gi, '-').toLowerCase();
  triggerDownload(img, fname);
}

// Keyboard nav for lightbox
document.addEventListener('keydown', e => {
  if (!document.getElementById('lightbox')?.classList.contains('open')) return;
  if (e.key === 'ArrowLeft')  lbNav(-1);
  if (e.key === 'ArrowRight') lbNav(1);
  if (e.key === 'Escape')     closeLightbox();
});

function bulkDownload() {
  const generated = SERVICES.filter(s => getImg(s.id));
  if (!generated.length) { alert('No images generated yet.'); return; }
  generated.forEach((s, i) => {
    const img = getImg(s.id);
    const fname = s.name.replace(/[^a-z0-9]/gi, '-').toLowerCase();
    setTimeout(() => triggerDownload(img, fname), i * 300);
  });
}

// ─── SIDEBAR ─────────────────────────────────────────────────────────────────
const collapsedCats = new Set(
  JSON.parse(localStorage.getItem('tf_collapsed') || '[]')
);
function saveCatCollapse() {
  try { localStorage.setItem('tf_collapsed', JSON.stringify([...collapsedCats])); } catch(e){}
}
function toggleCat(cat, blockEl) {
  if (collapsedCats.has(cat)) {
    collapsedCats.delete(cat);
    blockEl.classList.remove('collapsed');
  } else {
    collapsedCats.add(cat);
    blockEl.classList.add('collapsed');
  }
  saveCatCollapse();
}

function renderSidebar(services) {
  const cats = ['Marketing','Design','Development','Strategy'];
  const nav  = document.getElementById('serviceNav');
  nav.innerHTML = '';

  cats.forEach(cat => {
    const items = services.filter(s => s.cat === cat);
    if (!items.length) return;
    const isCollapsed = collapsedCats.has(cat);

    const block = document.createElement('div');
    block.className = 'cat-block' + (isCollapsed ? ' collapsed' : '');
    block.innerHTML = `
      <div class="cat-hdr" onclick="toggleCat('${cat}', this.parentElement)">
        <span class="cat-hdr-label">${cat}</span>
        <span class="cat-n">${items.length}</span>
        <span class="cat-chevron">▼</span>
      </div>
      <div class="cat-items">
        ${items.map(s => `
          <div class="svc-item ${s.id === currentId ? 'active' : ''}" id="nav-${s.id}" onclick="selectService(${s.id})">
            <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1">${s.name}</span>
          </div>
        `).join('')}
      </div>`;
    nav.appendChild(block);
  });

  const total = services.length;
  document.getElementById('progressPill').textContent =
    `${countGenerated()} / ${SERVICES.length} generated`;
}

function countGenerated() {
  return SERVICES.filter(s => getImg(s.id)).length;
}

function updateProgress() {
  document.getElementById('progressPill').textContent =
    `${countGenerated()} / ${SERVICES.length} generated`;
}

// ─── NAVIGATION ──────────────────────────────────────────────────────────────
function filterServices(q) {
  const t = q.toLowerCase();
  filtered = SERVICES.filter(s =>
    s.name.toLowerCase().includes(t) ||
    s.cat.toLowerCase().includes(t)  ||
    s.type.toLowerCase().includes(t)
  );
  renderSidebar(filtered);
  if (!filtered.find(s => s.id === currentId) && filtered.length)
    selectService(filtered[0].id);
}

function selectService(id) {
  currentId = id;
  clearTimeout(autoGenTimer);

  document.querySelectorAll('.svc-item').forEach(el => el.classList.remove('active'));
  const nav = document.getElementById(`nav-${id}`);
  if (nav) { nav.classList.add('active'); nav.scrollIntoView({ block:'nearest' }); }

  renderCard();

  // Auto-generate if no image
  if (!getImg(id)) {
    const cap = id;
    autoGenTimer = setTimeout(() => {
      if (currentId === cap) generateImage();
    }, 700);
  }
}

// ─── ICONS ───────────────────────────────────────────────────────────────────
const ICON_COPY  = `<svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>`;
const ICON_CHECK = `<svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;

// ─── CARD RENDER ─────────────────────────────────────────────────────────────
function renderNav() {
  const s = SERVICES.find(x => x.id === currentId);
  if (!s) return;
  const all  = SERVICES.map(x => x.id);
  const pos  = all.indexOf(s.id);
  const prev = pos > 0 ? all[pos-1] : null;
  const next = pos < all.length-1 ? all[pos+1] : null;
  const pageNav = document.getElementById('pageNav');
  if (!pageNav) return;
  pageNav.innerHTML = `
    <button class="nav-b" onclick="${prev ? `selectService(${prev})` : ''}" ${!prev?'disabled':''}>
      ← ${prev ? SERVICES.find(x=>x.id===prev).name : ''}
    </button>
    <button class="nav-b" onclick="${next ? `selectService(${next})` : ''}" ${!next?'disabled':''}>
      ${next ? SERVICES.find(x=>x.id===next).name : ''} →
    </button>`;
}

function renderCard() {
  const s = SERVICES.find(x => x.id === currentId);
  if (!s) return;

  const all  = SERVICES.map(x => x.id);
  const pos  = all.indexOf(s.id);
  const cc   = s.cat.toLowerCase();

  document.getElementById('serviceCard').innerHTML = `

    <!-- Header — outside the card surface -->
    <div class="card-head">
      <div class="card-meta">
        <span class="cat-tag ${cc}">${s.cat}</span>
        <span class="svc-type">${s.type}</span>
        <span class="card-pos">${pos+1} / ${SERVICES.length}</span>
      </div>
      <div class="card-name">${s.name}</div>
      <div class="card-def">${s.def}</div>
      <div class="card-chips">
        ${s.outcomes.map(o => `<span class="chip">${o}</span>`).join('')}
      </div>
    </div>

    <!-- Card surface — image + controls only -->
    <div class="svc-card">
      <div class="card-body">

        <!-- LEFT: image column -->
        <div class="card-img-col">
          <div class="sec-hdr">
            <span class="sec-label">Image</span>
            <div class="sec-actions">
              <button class="btn" id="regenBtn" onclick="generateImage()">Regenerate</button>
            </div>
          </div>
          <div class="img-area">
            <div class="img-body" id="imgBody"></div>
          </div>
          <div class="upload-link">
            or <label>upload your own<input type="file" accept="image/*" onchange="handleUpload(this)"></label>
          </div>
        </div>

        <!-- RIGHT: controls column -->
        <div class="card-ctrl-col">
          <div class="prompt-sec">
            <div class="prompt-hdr">
              <span class="sec-label">Prompt</span>
              <div class="sec-actions">
                <button class="btn btn-icon" id="copyBaseBtn" onclick="copyBasePrompt()" title="Copy prompt">${ICON_COPY}</button>
              </div>
            </div>
            <textarea class="prompt-ta" id="promptEdit" oninput="updatePreview()">${s.prompt}</textarea>

            <div class="preview-lbl-row">
              <span class="preview-lbl">Full prompt</span>
              <div class="sec-actions">
                <button class="btn btn-icon" id="copyBtn" onclick="copyPrompt()" title="Copy full prompt">${ICON_COPY}</button>
              </div>
            </div>
            <textarea class="preview-box" id="promptPreview" spellcheck="false" placeholder="Assembled prompt will appear here…"></textarea>
          </div>

          <div class="card-style-override">
            <button class="cso-toggle" onclick="toggleCso(this)">+ Style override for this page</button>
            <div class="cso-body" id="csoBody-${s.id}">
              <div class="cso-lbl">Overrides the global style for this service only</div>
              <textarea
                placeholder="e.g. Dark cinematic lighting, photorealistic, no flat illustration…"
                oninput="updatePreview()"
                id="csoTA-${s.id}"
              >${getCso(s.id)}</textarea>
            </div>
          </div>
        </div>
      </div>
    </div>`;

  renderNav();
  updatePreview();
  renderImgBody();
}

// ─── IMAGE AREA ───────────────────────────────────────────────────────────────
function renderImgBody() {
  const body = document.getElementById('imgBody');
  if (!body) return;
  const existing = getImg(currentId);
  if (existing) {
    showResult(existing);
  } else {
    body.innerHTML = `<div class="img-empty">Generating image…</div>`;
  }
}

function showResult(src) {
  const body = document.getElementById('imgBody');
  if (!body) return;
  const s = SERVICES.find(x => x.id === currentId);
  const fname = s ? s.name.replace(/[^a-z0-9]/gi,'-').toLowerCase() : `service-${currentId}`;
  body.innerHTML = `
    <div class="img-result">
      <img src="${src}" alt="${s?.name || ''}">
      <div class="img-btns">
        <button class="ib dl"    onclick="downloadImg('${fname}')">↓ Download</button>
        <button class="ib del"   onclick="clearImg()">✕</button>
      </div>
    </div>`;
  updateProgress();
}

// ─── PER-CARD STYLE OVERRIDE ─────────────────────────────────────────────────
const csoKey  = id => `tf_cso_${id}`;
const getCso  = id => { try { return localStorage.getItem(csoKey(id)) || ''; } catch(e){ return ''; } };
const saveCso = (id, v) => { try { if (v) localStorage.setItem(csoKey(id), v); else localStorage.removeItem(csoKey(id)); } catch(e){}; };

function toggleCso(btn) {
  const body = btn.nextElementSibling;
  const open = body.classList.toggle('open');
  btn.textContent = open ? '− Style override for this page' : '+ Style override for this page';
  if (open) body.querySelector('textarea')?.focus();
}

// ─── GENERATE ────────────────────────────────────────────────────────────────
function buildPrompt() {
  const fullTA = document.getElementById('promptPreview');
  if (fullTA?.value.trim()) return fullTA.value.trim();
  const core  = (document.getElementById('promptEdit')?.value || '').trim();
  const cso   = (document.getElementById(`csoTA-${currentId}`)?.value || '').trim();
  const style = cso || (document.getElementById('styleDesc')?.value || '').trim();
  saveCso(currentId, cso);
  return [style, core].filter(Boolean).join('. ');
}

async function generateImage() {
  const capId = currentId;

  const body = document.getElementById('imgBody');
  if (body) body.innerHTML = `
    <div class="img-gen-state">
      <div class="big-spin"></div>
      <div class="gen-txt">Generating…</div>
      <div class="gen-sub">Usually 10–30 seconds</div>
    </div>`;

  const regenBtn = document.getElementById('regenBtn');
  if (regenBtn) regenBtn.disabled = true;

  const prompt    = buildPrompt();
  const imageSize = document.getElementById('aspectRatio')?.value || 'landscape_16_9';
  const styleRefs = loadStyleRefs();
  const styleImage = styleRefs.length ? styleRefs[0] : null;

  try {
    const res = await fetch(WORKER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt, image_size: imageSize, style_image: styleImage })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || `Error ${res.status}`);
    if (!data.imageUrl) throw new Error('No image returned');

    if (currentId !== capId) return;

    saveImg(capId, data.imageUrl);
    showResult(data.imageUrl);

  } catch(err) {
    if (currentId !== capId) return;
    const b2 = document.getElementById('imgBody');
    if (b2) b2.innerHTML = `
      <div class="img-error">
        <strong>Generation failed:</strong> ${err.message || 'Unknown error.'}<br>
        Make sure the Cloudflare Worker is deployed and WORKER_URL is set.
      </div>`;
  } finally {
    if (currentId === capId) {
      const rb = document.getElementById('regenBtn');
      if (rb) rb.disabled = false;
    }
  }
}


function blobToDataUrl(blob) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = e => res(e.target.result);
    r.onerror = rej;
    r.readAsDataURL(blob);
  });
}

// ─── IMAGE ACTIONS ────────────────────────────────────────────────────────────
function downloadImg(fname) {
  const img = document.querySelector('#imgBody img');
  if (!img) return;
  triggerDownload(img.src, fname);
}

function clearImg() {
  delImg(currentId);
  updateProgress();
  renderImgBody();
}

function handleUpload(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    saveImg(currentId, e.target.result);
    showResult(e.target.result);
  };
  reader.readAsDataURL(file);
}

// ─── PROMPT ──────────────────────────────────────────────────────────────────
function updatePreview() {
  const prev = document.getElementById('promptPreview');
  if (!prev) return;
  const core  = (document.getElementById('promptEdit')?.value || '').trim();
  const cso   = (document.getElementById(`csoTA-${currentId}`)?.value || '').trim();
  const style = cso || (document.getElementById('styleDesc')?.value || '').trim();
  prev.value = [core, style].filter(Boolean).join('. ');
}

function resetPrompt(id) {
  const s = SERVICES.find(x => x.id === id);
  if (!s) return;
  const ta = document.getElementById('promptEdit');
  if (ta) { ta.value = s.prompt; updatePreview(); }
}

function copyPrompt() {
  const prev = document.getElementById('promptPreview');
  if (!prev) return;
  navigator.clipboard.writeText(prev.value).then(() => {
    const btn = document.getElementById('copyBtn');
    if (!btn) return;
    btn.innerHTML = ICON_CHECK;
    btn.classList.add('green');
    setTimeout(() => { btn.innerHTML = ICON_COPY; btn.classList.remove('green'); }, 1800);
  });
}

function copyBasePrompt() {
  const ta = document.getElementById('promptEdit');
  if (!ta) return;
  navigator.clipboard.writeText(ta.value).then(() => {
    const btn = document.getElementById('copyBaseBtn');
    if (!btn) return;
    btn.innerHTML = ICON_CHECK;
    btn.classList.add('green');
    setTimeout(() => { btn.innerHTML = ICON_COPY; btn.classList.remove('green'); }, 1800);
  });
}
</script>
